<!doctype html>
<html lang="{{lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family: &quot;Helvetica Neue&quot;, Arial, sans-serif;
      background-color: #f4f4f5;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="min-height: 100vh"
    >
      <tr>
        <td align="center" style="padding: 40px 20px">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 600px;
              background-color: #ffffff;
              border-radius: 16px;
              box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            "
          >
            <!-- Header -->
            <tr>
              <td
                style="
                  padding: 40px 40px 20px;
                  text-align: center;
                  background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
                  border-radius: 16px 16px 0 0;
                "
              >
                <p
                  style="
                    margin: 0 0 8px;
                    font-size: 13px;
                    font-weight: 600;
                    color: rgba(255, 255, 255, 0.8);
                    letter-spacing: 2px;
                    text-transform: uppercase;
                  "
                >
                  medimate app
                </p>
                <h1
                  style="
                    margin: 0 0 8px;
                    font-size: 26px;
                    font-weight: 700;
                    color: #ffffff;
                  "
                >
                  {{headline}}
                </h1>
                <p style="margin: 0; font-size: 14px; color: rgba(255,255,255,0.75)">
                  {{subheadline}}
                </p>
              </td>
            </tr>

            <!-- Greeting -->
            <tr>
              <td style="padding: 32px 40px 0">
                <p
                  style="
                    margin: 0 0 8px;
                    font-size: 16px;
                    line-height: 1.6;
                    color: #374151;
                  "
                >
                  {{greeting}}
                </p>
                <p
                  style="
                    margin: 0;
                    font-size: 15px;
                    line-height: 1.6;
                    color: #6b7280;
                  "
                >
                  {{intro}}
                </p>
              </td>
            </tr>

            <!-- Papers -->
            {{papers}}

            <!-- Footer -->
            <tr>
              <td style="padding: 32px 40px 40px">
                <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 0 0 24px" />
                <p
                  style="
                    margin: 0 0 8px;
                    font-size: 13px;
                    line-height: 1.5;
                    color: #9ca3af;
                    text-align: center;
                  "
                >
                  {{footerText}}
                </p>
                <p
                  style="
                    margin: 0;
                    font-size: 13px;
                    color: #9ca3af;
                    text-align: center;
                  "
                >
                  medimate app
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
